# FITS header keywords
fits_keywords:
  ra_key: "OBJCTRA"
  dec_key: "OBJCTDEC"
  date_key: "DATE-OBS"
  exposure_key: "EXPTIME"
  jd_key: "JD"

# Astrometry parameters
astrometry:
  solve_mode: "solve"
  radius: 0.5
  quad_scales: [0, 2, 4, 6]
  cache_tolerance: 0.1
  epoch_bucket_precision: 1

# Instrument parameters
instrument:
  pixel_scale: 0.62
  gain: 0.57
  read_noise: 4.11
  saturation_level: 50000

observatory:
  observatory_code: "A84"

source_detection:
  fwhm_guess: 5.0
  threshold_sigma: 1.3
  min_area: 5
  edge_margin: 10

matching:
  isolation_radius_arcsec: 0.2
  match_constraint_arcsec: 1.0

photometry:
  mode: "asteroid"
  target_id: "19184"
  coords: [124.756279, 16.294038]
  coords_unit: "deg"
  filter: "R"
  aperture_method: "fixed_arcsec"
  aperture: 4
  annulus_inner: 7
  annulus_outer: 9
  zeropoint: "fit"

paths:
  input_dir: "A"
  temp_dir: "data/temp"
  index_dir: "data/indexes"
  solve_dir: "output"
  output_photometry: "photometry.csv"
  output_astrometry: "astrometry.csv"
  file_extension: "fits"
  plot_dir: "output/plots"
  cutout_dir: "output/cutouts"

plots:
  plot_astrometry: true
  plot_image: true
  plot_light_curve: true
  image_scale: "pixel"
  light_curve_x_axis: "relative_seconds"
  light_curve_aux_panels: true
  light_curve_pdf: true
  light_curve_event_window: null
  light_curve_event_unit: "relative_seconds"

catalog: "gaiadr3.gaia_source"
